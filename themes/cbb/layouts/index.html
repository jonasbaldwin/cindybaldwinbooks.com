<!DOCTYPE html>
<html lang="en">
{{- partial "head.html" . -}}
<body>
<div id="app">
  <div id="application">
    <div class="bugs">
      {{ range where .Site.Params.bugs "page" .Title }}
      {{ partial "bug.html" . }}
      {{ end }}
    </div>
    <div>
      <div class="splash">
        <div class="header">
          <img src="/images/header-black.png" class="logo">
        </div>
        <div class="body">
          <div class="shelves">
            <div class="shelf-1">
              <a href="/about"><img src="/images/shelf/book-1-1.png" alt="About"></a>
              <a href="/books"><img src="/images/shelf/book-1-2.png" alt="Books"></a>
              <a href="/events"><img src="/images/shelf/book-1-3.png" alt="Events"></a>
              <a href="/press-kit"><img src="/images/shelf/book-1-4.png" alt="Press Kit"></a>
              <img src="images/shelf/shelf-1-honey.png" class="home-links honey">
              <a href="/for-teachers"><img src="/images/shelf/book-1-5.png" alt="For Teachers"></a>
              <a href="/for-writers"><img src="/images/shelf/book-1-6.png" alt="For Writers"></a>
              <a href="/for-kids"><img src="/images/shelf/book-1-7.png" alt="For Kids"></a>
              <a href="/extras"><img src="/images/shelf/book-1-8.png" alt="Extras"></a>
              <a href="http://blog.cindybaldwinbooks.com/" target="_blank"><img src="/images/shelf/book-2-1.png"
                                                                                alt="Blog"></a>
              <a href="/faq"><img src="/images/shelf/book-2-2.png" alt="faq" style="margin-bottom: 1px"></a>
              <img src="/images/shelf/shelf-2-open-book.png" class="home-links open-book">
              <img src="/images/shelf/book-2-3.png" class="home-links purple-book">
            </div>
          </div>
        </div>
      </div>
<!--      index newsletter signup -->
      <div class="content newsletter" style="width:480px">
        <iframe src="https://cindybaldwinbooks.substack.com/embed" width="480" height="320"
                style="border:1px solid #EEE; background:white;" frameborder="0" scrolling="no"></iframe>
      </div>
    </div>
  </div>
  {{- partial "footer.html" . -}}
</div>
<script type='text/javascript' src='//s3.amazonaws.com/downloads.mailchimp.com/js/mc-validate.js'></script>
<script type='text/javascript'>(function ($) {
    window.fnames = new Array();
    window.ftypes = new Array();
    fnames[0] = 'EMAIL';
    ftypes[0] = 'email';
    fnames[1] = 'FNAME';
    ftypes[1] = 'text';
    fnames[2] = 'LNAME';
    ftypes[2] = 'text';
}(jQuery));
var $mcj = jQuery.noConflict(true);</script>

    window.dataLayer = window.dataLayer || [];

    function gtag() {
        dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'UA-48057818-2');
</script>

</body>
</html>
